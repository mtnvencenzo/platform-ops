apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/managed-by: argocd
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ollama-host-static
  namespace: ai-platform
  labels:
    kubernetes.io/service-name: ollama-host
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/managed-by: argocd
addressType: IPv4
ports:
  - name: http
    port: 11434
    protocol: TCP
endpoints:
  - addresses:
      - 172.18.0.1
    conditions: {}
