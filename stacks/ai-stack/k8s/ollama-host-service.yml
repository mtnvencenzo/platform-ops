apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/managed-by: argocd
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-host
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/managed-by: argocd
subsets:
  - addresses:
      - ip: 172.18.0.1
    ports:
      - name: http
        port: 11434
        protocol: TCP
