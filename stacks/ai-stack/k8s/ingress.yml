apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
  annotations:
    # k3s uses Traefik by default
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    # Qdrant – accessible at http://qdrant.127.0.0.1.sslip.io
    - host: qdrant.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333
    # TEI – accessible at http://tei.127.0.0.1.sslip.io
    - host: tei.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tei
                port:
                  number: 8989
    # TEI Reranker – accessible at http://tei-reranker.127.0.0.1.sslip.io
    - host: tei-reranker.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tei-reranker
                port:
                  number: 8990
    # TEI Splade – accessible at http://tei-splade.127.0.0.1.sslip.io
    - host: tei-splade.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tei-splade
                port:
                  number: 8991

