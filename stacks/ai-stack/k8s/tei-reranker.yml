apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-reranker
  namespace: ai-platform
  labels:
    app: tei-reranker
    app.kubernetes.io/part-of: ai-platform
    component: reranker
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tei-reranker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: tei-reranker
        component: reranker
    spec:
      # === NVIDIA GPU (commented out) ===
      # TEI runs in CPU mode — ROCm TEI only supports AMD Instinct, not RDNA.
      # For NVIDIA: uncomment runtimeClassName, GPU limit, CUDA env vars, and tolerations.
      # runtimeClassName: nvidia
      containers:
        - name: tei-reranker
          # CPU image — for NVIDIA: change to ghcr.io/huggingface/text-embeddings-inference:1.8
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
          args:
            - "--model-id"
            - "$(TEI_RERANKER_MODEL_ID)"
            - "--max-client-batch-size"
            - "$(TEI_RERANKER_MAX_CLIENT_BATCH)"
            - "--port"
            - "$(TEI_RERANKER_PORT)"
          ports:
            - containerPort: 8990
              name: http
          env:
            - name: TEI_RERANKER_MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-platform-config
                  key: TEI_RERANKER_MODEL_ID
            - name: TEI_RERANKER_MAX_CLIENT_BATCH
              valueFrom:
                configMapKeyRef:
                  name: ai-platform-config
                  key: TEI_RERANKER_MAX_CLIENT_BATCH
            - name: TEI_RERANKER_PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-platform-config
                  key: TEI_RERANKER_PORT
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-platform-secrets
                  key: HF_TOKEN
            - name: HF_HOME
              value: "/root/.cache/huggingface"
            # === NVIDIA GPU (commented out) ===
            # - name: CUDA_VISIBLE_DEVICES
            #   value: "all"
            # - name: NVIDIA_VISIBLE_DEVICES
            #   value: "all"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-platform-secrets
                  key: TEI_RERANKER_API_KEY
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              # === NVIDIA GPU (commented out) ===
              # nvidia.com/gpu: "1"
              cpu: "2"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8990
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8990
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
      # === NVIDIA GPU (commented out) ===
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-tei-reranker
---
apiVersion: v1
kind: Service
metadata:
  name: tei-reranker
  namespace: ai-platform
  labels:
    app: tei-reranker
    app.kubernetes.io/part-of: ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  type: ClusterIP
  selector:
    app: tei-reranker
  ports:
    - name: http
      port: 8990
      targetPort: 8990
