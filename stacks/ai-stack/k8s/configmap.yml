apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "10"
data:
  # Ollama
  OLLAMA_HOST: "0.0.0.0"
  # OLLAMA_NUM_GPU controls how many GPU layers to offload. Works with both NVIDIA (CUDA) and AMD (ROCm).
  OLLAMA_NUM_GPU: "999"
  # Restrict ROCm workloads to specific GPU(s) by device index. Run 'rocm-smi' on the host to identify
  # discrete GPUs (higher power draw) vs the iGPU (~0W). Use comma-separated indices for multiple
  # GPUs (e.g. "0,1"). Adjust if your hardware differs.
  ROCR_VISIBLE_DEVICES: "0"
  # Override GFX version for RDNA 4 (gfx1201) compatibility. Many ROCm images don't ship
  # pre-built kernels for gfx1201 yet. Adjust for your architecture (e.g. "11.0.0" for gfx1100).
  HSA_OVERRIDE_GFX_VERSION: "12.0.0"

  # Open WebUI
  OLLAMA_BASE_URL: "http://ollama-host:11434"
  WEBUI_NAME: "AI Stack WebUI"
  TZ: "UTC"

  # Qdrant
  QDRANT__LOG_LEVEL: "INFO"

  # TEI Embeddings
  TEI_MODEL_ID: "sentence-transformers/all-mpnet-base-v2"
  TEI_MAX_CLIENT_BATCH: "128"
  TEI_PORT: "8989"

  # TEI Reranker
  TEI_RERANKER_MODEL_ID: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  TEI_RERANKER_MAX_CLIENT_BATCH: "64"
  TEI_RERANKER_PORT: "8990"

  # TEI SPLADE
  TEI_SPLADE_MODEL_ID: "naver/splade-cocondenser-ensembledistil"
  TEI_SPLADE_MAX_CLIENT_BATCH: "64"
  TEI_SPLADE_PORT: "8991"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-platform-secrets
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
    argocd.argoproj.io/sync-wave: "10"
type: Opaque
stringData:
  # Hugging Face token – replace with your actual token
  HF_TOKEN: ""
  # TEI API keys
  TEI_API_KEY: "6307fd7e-8ab7-4d21-bf20-3efd2c5a17f3"
  TEI_RERANKER_API_KEY: "6307fd7e-8ab7-4d21-bf20-3efd2c5a17f3"
  TEI_SPLADE_API_KEY: "6307fd7e-8ab7-4d21-bf20-3efd2c5a17f3"
