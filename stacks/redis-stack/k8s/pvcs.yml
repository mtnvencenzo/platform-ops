apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: redis-platform
  labels:
    app.kubernetes.io/part-of: redis-platform
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-insight-data
  namespace: redis-platform
  labels:
    app.kubernetes.io/part-of: redis-platform
  annotations:
    argocd.argoproj.io/sync-wave: "45"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
