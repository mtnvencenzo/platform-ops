apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: azure-platform-ingress
  namespace: azure-platform
  labels:
    app.kubernetes.io/part-of: azure-platform
  annotations:
    kubernetes.io/ingress.class: traefik
    argocd.argoproj.io/sync-wave: "50"
spec:
  rules:
    # Azurite – accessible at http://azurite.127.0.0.1.sslip.io
    - host: azure-blob.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: azurite
                port:
                  number: 10000
    - host: azure-queue.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: azurite
                port:
                  number: 10001
    - host: azure-table.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: azurite
                port:
                  number: 10002
