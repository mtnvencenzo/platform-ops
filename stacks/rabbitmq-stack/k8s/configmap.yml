apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-platform-secrets
  namespace: rabbitmq-platform
  labels:
    app.kubernetes.io/part-of: rabbitmq-platform
  annotations:
    argocd.argoproj.io/sync-wave: "10"
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_DEFAULT_PASS: "password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: rabbitmq-platform
  labels:
    app.kubernetes.io/part-of: rabbitmq-platform
  annotations:
    argocd.argoproj.io/sync-wave: "10"
data:
  rabbitmq.conf: |
    # Disable non-SSL listener
    # listeners.tcp = none
    listeners.tcp.default = 5672

    # Enable SSL listener only
    # listeners.ssl.default = 5671
    # ssl_options.cacertfile = /etc/rabbitmq/certs/docker-local.crt
    # ssl_options.certfile = /etc/rabbitmq/certs/docker-local.crt
    # ssl_options.keyfile = /etc/rabbitmq/certs/docker-local.key
    # ssl_options.verify = verify_none
    # ssl_options.fail_if_no_peer_cert = false
